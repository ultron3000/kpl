<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPL Season 5</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        .logo-container {
            margin-top: 30px;
        }
        .main-logo img {
            width: 100%;
            max-width: 100px; /* Adjusted size */
        }
        .logo-link img {
            width: 150px;
            height: 150px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .logo-link img:hover {
            transform: scale(1.1);
        }
        .back-button {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
        }
        .back-button:hover {
            background-color: #0056b3;
        }
        @media (max-width: 768px) {
            .logo-link img {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="main-logo">
        <img src="https://i.imgur.com/BO12gpN.png" alt="Main Logo">
    </div>

    <div class="logo-container">
        <a href="logo1.html" class="logo-link">
            <img src="https://i.imgur.com/Mp07t1F.jpeg" alt="Logo 1">
        </a>
        <a href="logo2.html" class="logo-link">
            <img src="https://i.imgur.com/z61Kmc9.jpeg" alt="Logo 2">
        </a>
        <a href="logo3.html" class="logo-link">
            <img src="https://i.imgur.com/hWXvHbK.jpeg" alt="Logo 3">
        </a>
        <a href="logo4.html" class="logo-link">
            <img src="https://i.imgur.com/04iV87B.jpeg" alt="Logo 4">
        </a>
        <a href="logo5.html" class="logo-link">
            <img src="https://i.imgur.com/hPeNdfH.jpeg" alt="Logo 5">
        </a>
        <a href="logo6.html" class="logo-link">
            <img src="https://i.imgur.com/mEvsCYP.jpeg" alt="Logo 6">
        </a>
    </div>

    <!-- Link to Match Schedule -->
    <a href="schedule.html" class="back-button">View Match Schedule</a>
</body>
</html>
